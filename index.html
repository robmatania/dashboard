<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .cards {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 16px;
    padding: 2.5rem 3rem;
    text-align: center;
    min-width: 220px;
  }

  .label {
    font-size: 1rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }

  .value {
    font-size: 5rem;
    font-weight: 300;
    line-height: 1;
  }

  .unit {
    font-size: 2rem;
    color: #8b949e;
    margin-left: 0.2em;
  }

  .temp .value { color: #f97316; }
  .hum .value  { color: #38bdf8; }

  .updated {
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: #484f58;
  }

  .error { color: #f85149; font-size: 0.9rem; margin-top: 2rem; }
</style>
</head>
<body>

<div class="cards">
  <div class="card temp">
    <div class="label">Temperature</div>
    <div class="value" id="temp">--<span class="unit">°C</span></div>
  </div>
  <div class="card hum">
    <div class="label">Humidity</div>
    <div class="value" id="hum">--<span class="unit">%</span></div>
  </div>
</div>

<div class="updated" id="updated">Fetching data…</div>
<div class="error" id="error"></div>

<script>
  const CHANNEL = '3414167';
  const API_KEY = 'OY6GZDI8UAO07J47';
  const URL = `https://api.thingspeak.com/channels/${CHANNEL}/feeds/last.json?api_key=${API_KEY}`;

  function fmt(val) {
    const n = parseFloat(val);
    return isNaN(n) ? '--' : n.toFixed(1);
  }

  function update() {
    fetch(URL)
      .then(r => r.json())
      .then(data => {
        document.getElementById('temp').innerHTML = fmt(data.field1) + '<span class="unit">°C</span>';
        document.getElementById('hum').innerHTML  = fmt(data.field2) + '<span class="unit">%</span>';
        const t = new Date(data.created_at);
        document.getElementById('updated').textContent = 'Last update: ' + t.toLocaleTimeString();
        document.getElementById('error').textContent = '';
      })
      .catch(() => {
        document.getElementById('error').textContent = 'Could not reach ThingSpeak. Retrying…';
      });
  }

  update();
  setInterval(update, 60000);
</script>
</body>
</html>
